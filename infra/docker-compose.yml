# 로컬 개발용. Docker 미설치 시 로컬 PostgreSQL 을 직접 사용해도 됨.
# 실행: docker compose -f infra/docker-compose.yml up -d db
services:
  db:
    image: postgres:16
    container_name: pyosim-db
    environment:
      POSTGRES_USER: pyosim
      POSTGRES_PASSWORD: pyosim
      POSTGRES_DB: pyosim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyosim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
