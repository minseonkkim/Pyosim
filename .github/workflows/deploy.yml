name: Deploy to Cloud Run

# main 에 push 되면 자동으로 빌드·배포한다.
# 인증: Workload Identity Federation (장기 키 없음).
# 사전 설정(1회): infra/setup-github-actions.sh 참고.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # 수동 실행 버튼

env:
  PROJECT_ID: project-01308378-97ce-4b8a-8d1
  REGION: asia-northeast3
  AR: asia-northeast3-docker.pkg.dev/project-01308378-97ce-4b8a-8d1/pyosim
  API_URL: https://pyosim-api-785567251954.asia-northeast3.run.app
  GA_ID: G-H39S9GR8PY

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF 토큰 발급에 필요
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: GCP 인증 (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/785567251954/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@project-01308378-97ce-4b8a-8d1.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker 인증 (Artifact Registry)
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # ───────── 이미지 빌드·푸시 (GitHub 러너에서 직접) ─────────
      - name: 백엔드 이미지
        run: |
          docker build -t "$AR/api:$GITHUB_SHA" -t "$AR/api:latest" ./backend
          docker push "$AR/api:$GITHUB_SHA"
          docker push "$AR/api:latest"

      - name: 프론트 이미지 (API URL 주입)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE="$API_URL" \
            --build-arg NEXT_PUBLIC_GA_ID="$GA_ID" \
            -t "$AR/web:$GITHUB_SHA" -t "$AR/web:latest" ./frontend
          docker push "$AR/web:$GITHUB_SHA"
          docker push "$AR/web:latest"

      - name: ETL 이미지 (backend+etl, 루트 컨텍스트)
        run: |
          docker build -f etl/Dockerfile -t "$AR/etl:$GITHUB_SHA" -t "$AR/etl:latest" .
          docker push "$AR/etl:$GITHUB_SHA"
          docker push "$AR/etl:latest"

      # ───────── 배포 (기존 env/secret/cloudsql 설정은 보존됨) ─────────
      - name: 백엔드 배포
        run: |
          gcloud run deploy pyosim-api \
            --image "$AR/api:$GITHUB_SHA" --region "$REGION"

      - name: DB 마이그레이션 (alembic upgrade)
        run: |
          gcloud run jobs update pyosim-migrate --image "$AR/api:$GITHUB_SHA" --region "$REGION"
          gcloud run jobs execute pyosim-migrate --region "$REGION" --wait

      - name: 프론트 배포
        run: |
          gcloud run deploy pyosim-web \
            --image "$AR/web:$GITHUB_SHA" --region "$REGION"

      - name: ETL 이미지 갱신 (스케줄러가 다음 실행부터 사용)
        run: |
          gcloud run jobs update pyosim-daily --image "$AR/etl:$GITHUB_SHA" --region "$REGION"
